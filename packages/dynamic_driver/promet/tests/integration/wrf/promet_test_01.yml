

plugin: wrf

input_data: './input_data/d02_2019-05-05_*'

input_crs: 'EPSG:4326' # global latlon (like GPS)
palm_crs: 'EPSG:25832' # UTM 32N

palm_variable_groups:
  - init_atmosphere_pt
  - init_atmosphere_qv
  - init_atmosphere_u
  - init_atmosphere_v
  - init_atmosphere_w
  - init_atmosphere_no
  - init_atmosphere_no2
  - init_atmosphere_o3
  - init_atmosphere_pm10
  - init_atmosphere_pm2.5
  - init_soil_t
  - init_soil_m
  - surface_forcing_surface_pressure
  - ls_forcing_pt
  - ls_forcing_qv
  - ls_forcing_u
  - ls_forcing_v
  - ls_forcing_w
  - ls_forcing_no
  - ls_forcing_no2
  - ls_forcing_o3
  - ls_forcing_pm10
  - ls_forcing_pm2.5

start_time: 2019-05-05 00:00:00 +00
end_time: 2019-05-05 06:00:00 +00

#zsoil: [0.01, 0.25, 0.7, 1.5]
#top_adjustment_index: -1  # control the vertical index up to which the forcing data is remapped to the PALM terrain (use -1 to match nzt)
