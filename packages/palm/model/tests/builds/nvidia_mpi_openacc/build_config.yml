---
# this is a palmtest build configuration file

compiler:
  id: NVIDIA
  c_executable: "{{NVIDIA.c_executable}}"
  executable: "{{NVIDIA.executable}}"
  mpi_wrapper: "{{NVIDIA.mpi_wrapper}}"
  definitions:
    - "MPI_REAL=MPI_DOUBLE_PRECISION"
    - "MPI_2REAL=MPI_2DOUBLE_PRECISION"
    - "__parallel"
    - "__cuda_aware_mpi"
  c_options:
    default:
      - "-fast"
    debug:
      - "-g"
      - "-traceback"
  rrtmg_options:
    default: []
    debug: []
  options:
    default:
      - "-cpp"
      - "-O3"
      - "-acc=verystrict"
      - "-gpu=cc80"
      - "-Minfo=accel"
      - "-cuda"
    debug:
      - "-cpp"
      - "-C"
      - "-g"
      - "-O0"
      - "-acc=verystrict"
      - "-gpu=cc80,math_uniform"
      - "-Mnofma"
      - "-Minfo=accel"
      - "-cuda"
  includes: []

linker:
  options:
    - "-O3"
    - "-acc=verystrict"
    - "-gpu=cc80"
    - "-Minfo=accel"
    - "-Mcuda"
