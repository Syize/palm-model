---
#-------------------------------------------------------------------------------
# Global netCDF Attributes
#-------------------------------------------------------------------------------
#global_attributes:
global_attributes:
  origin_lat:
    type: NC_FLOAT
    mandatory: false
    si-unit: degree
    description:
      short: Geographical latitude in degrees north.
      long: |
        **This metadata information is purely informative and is not used in the model.** This attribute defines latitude of the south border of the model domain. Note, that if the same attribute is given in the [static driver](../static/#static), it will affect the simulation (see [origin_lat](../static/#static--global_attribute--origin_lat)).

  origin_lon:
    type: NC_FLOAT
    mandatory: false
    si-unit: degree
    description:
      short: Geographical longitude in degrees west.
      long: |
        **This metadata information is purely informative and is not used in the model.** This attribute defines longitude of the west border of the model domain. Note, that if the same attribute is given in the [static driver](../static/#static), it will affect the simulation (see [origin_lon](../static/#static--global_attribute--origin_lon)).

  origin_time:
    type: NC_FLOAT
    mandatory: false
    si-unit: s
    description:
      short: Origin time of the dynamic input data.
      long: |
        **This metadata information is purely informative and is not used in the model.** Origin time of the dynamic driver data. Date and time for the model start is set via namelist parameter [origin_date_time](../../../Namelists/#initialization_parameters--origin_date_time).

  origin_x:
    type: NC_FLOAT
    mandatory: false
    si-unit: m
    description:
      short: E-UTM coordinate of the respective UTM zone.
      long: |
        **This metadata information is purely informative and is not used in the model.** This attribute defines E-UTM coordinate of the west border of the model domain. Note, that if the same attribute is given in the [static driver](../static/#static), it will affect the simulation (see [origin_x](../static/#static--global_attribute--origin_x)).

  origin_y:
    type: NC_FLOAT
    mandatory: false
    si-unit: m
    description:
      short: N-UTM coordinate of the respective UTM zone.
      long: |
        **This metadata information is purely informative and is not used in the model.** This attribute defines N-UTM coordinate of the west border of the model domain. Note, that if the same attribute is given in the [static driver](../static/#static), it will affect the simulation (see [origin_y](../static/#static--global_attribute--origin_x)).

  origin_z:
    type: NC_FLOAT
    mandatory: false
    si-unit: m
    description:
      short: z-coordinate of the bottom model boundary.
      long: |
        **This metadata information is purely informative and is not used in the model.** This attribute defines z-coordinate of the bottom model boundary.

  rotation_angle:
    type: NC_FLOAT
    mandatory: false
    si-unit: degrees
    description:
      short: rotation angle of the model domain.
      long: |
        **This metadata information is purely informative and is not used in the model.** This attribute defines the clockwise rotation angle of the model domain. Note, that if the same attribute is given in the [static driver](../static/#static), it will affect the simulation (see [rotation_angle](../static/#static--global_attribute--rotation_angle)).

#-------------------------------------------------------------------------------
# netCDF Dimensions
#-------------------------------------------------------------------------------
dimensions:
  time:
    mandatory: false
    size:
      value_of: "time indices"
    description:
      short: Number of time indices.
      long: |
        The number of time indices given in the dynamic driver.
        Time values can be given via variable [time](#dynamic--variable--time).
        The time values in the dynamic driver file must cover the entire simulation time (last time value >= [end_time](#../../../Namelists/runtime_parameters--end_time)).

  time_inflow:
    mandatory: false
    size:
      value_of: "time indices for turbulent inflow data"
    description:
      short: Number of time indices for turbulent inflow data.
      long: |
        Time dimension of turbulent inflow data for high temporal resolution. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = 'read_from_file'.
        Time values for turbulent inflow data can be given via variable [time_inflow](#dynamic--variable--time_inflow).

  time_rad:
    mandatory: false
    size:
      value_of: "time indices for external radiative forcing"
    description:
      short: Number of time indices for external radiative forcing.
      long: |
        Time dimension of external radiative forcing. Mandatory if namelist parameter [radiation_scheme](../../../Namelists/#radiation_parameters--radiation_scheme) = *'external'*.
        Time values for external radiative forcing can be given via variable [time_rad](#dynamic--variable--time_rad).

  x:
    mandatory: true
    size:
      value_of: "namelist parameter [nx](../../../Namelists/#initialization_parameters--nx)+1"
    description:
      short: Number of grid points along `x`.
      long: |
        The number of grid points along `x` must match `nx + 1`, with [nx](../../../Namelists/#initialization_parameters--nx) as given in the initialization parameters namelist. `x` coordinates of the grid points can be given via variable [x](#dynamic--variable--x).

  xu:
    mandatory: true
    size:
      value_of: "namelist parameter [nx](../../../Namelists/#initialization_parameters--nx)"
    description:
      short: Number of grid points along `xu` (for u-velocity).
      long: |
        The number of grid points along `xu` must match `nx`, with [nx](../../../Namelists/#initialization_parameters--nx) as given in the initialization parameters namelist. `xu` coordinates of the grid points can be given via variable [xu](#dynamic--variable--xu).

  y:
    mandatory: true
    size:
      value_of: "namelist parameter [ny](../../../Namelists/#initialization_parameters--ny)+1"
    description:
      short: Number of grid points along `y`.
      long: |
        The number of grid points along `y` must match `ny + 1`, with [ny](../../../Namelists/#initialization_parameters--ny) as given in the initialization parameters namelist. `y` coordinates of the grid points can be given via variable [y](#dynamic--variable--y).
  yv:
    mandatory: true
    size:
      value_of: "namelist parameter [ny](../../../Namelists/#initialization_parameters--ny)"
    description:
      short: Number of grid points along `yv` (for v-velocity).
      long: |
        The number of grid points along `yv` must match `ny`, with [ny](../../../Namelists/#initialization_parameters--ny) as given in the initialization parameters namelist. `yv` coordinates of the grid points can be given via variable [yv](#dynamic--variable--yv).

  z:
    mandatory: true
    size:
      value_of: "namelist parameter [nz](../../../Namelists/#initialization_parameters--nz)"
    description:
      short: Number of grid points along `z`.
      long: |
        The number of grid points along `z` must match `nz`, with [nz](../../../Namelists/#initialization_parameters--nz) as given in the initialization parameters namelist. `z` coordinates of the grid points can be given via variable [z](#dynamic--variable--z). 
  zw:
    mandatory: true
    size:
      value_of: "namelist parameter [nz](../../../Namelists/#initialization_parameters--nz)-1"
    description:
      short: Number of grid points along `zw`.
      long: |
        The number of grid points along `zw` must match `nz-1`, with [nz](../../../Namelists/#initialization_parameters--nz) as given in the initialization parameters namelist. `zw` coordinates of the grid points can be given via variable [zw](#dynamic--variable--zw).

  zsoil:
    mandatory: false
    size:
      value_of: index value of deepest soil grid point.
    description:
      short: Number of grid points in a vertical soil column.
      long: |
        The number of grid points along `z` in a vertical soil column. The `zsoil`-layer depth and their indices can be fully independent on the [static driver](../static/#static) settings [zsoil](../static/#static--variable--zsoil). Values will be interpolated onto the respective levels. `zsoil` coordinates of the grid points can be given via variable [zsoil](#dynamic--variable--zsoil).

