  #     short: Large­-scale forcing data for the advection tendency of mixing ratio.
  #     long: |
  #       Large-scale forcing data for the subsidence velocity.
  #       Requires cyclic boundary conditions as well as large_scale_forcing = .T. to become effective.

  ls_forcing_left_pt:
    modules: ["PAC"]
    si-unit: K
    mandatory: false
    type: NC_FLOAT
    shape: (time,z,y)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Boundary condition at left (west) model boundary for the potential temperature.
      long: |
        Boundary condition at left (west) model boundary for the potential temperature.
        Requires [nesting_offl_parameters](../../../Namelists/#offline-nesting-parameters) to be enabled to become effective.
        In case of `lod` = *1*, a spatial 1-dimensional profile (time, z) of potential temperature is prescribed, while for `lod` = *2* a spatial 2-dimensional plane of potential temperature is used as a boundary condition.

  ls_forcing_left_qv:
    modules: ["PAC"]
    si-unit: kg kg^-1^
    mandatory: false
    type: NC_FLOAT
    shape: (time,z,y) # x is not used
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Boundary condition at left (west) model boundary for the mixing ratio.
      long: |
        Boundary condition at left (west) model boundary for the mixing ratio.
