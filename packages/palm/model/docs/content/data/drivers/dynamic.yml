  inflow_plane_e:
    modules: ["PAC"]
    si-unit: m^2^ s^-2^
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow,z,y)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Inflow boundary data for the SGS-TKE.
      long: |
        Inflow boundary data for the SGS-TKE. Only `lod` = *2* allowed. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*.

  inflow_plane_pt:
    modules: ["PAC"]
    si-unit: K
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow,z,y)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Inflow boundary data for the potential temperature.
      long: |
        Inflow boundary data for the potential temperature. Only `lod` = *2* allowed. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*
        and [neutral](#../../../Namelists/#initialization_parameters--neutral) = *.F.*).

  inflow_plane_q:
    modules: ["PAC"]
    si-unit: kg kg^-1^
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow,z,y)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Inflow boundary data for the mixing ratio.
      long: |
        Inflow boundary data for the mixing ratio. Only `lod` = *2* allowed. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*
        and [humidity](#../../../Namelists/#initialization_parameters--humidity) = *.T.*.

  inflow_plane_u:
    modules: ["PAC"]
    si-unit: m s^-1^
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow,z,y)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Inflow boundary data for the u-component.
      long: |
        Inflow boundary data for the u-component. Only `lod` = *2* allowed. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*.

  inflow_plane_v:
    modules: ["PAC"]
    si-unit: m s^-1^
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow,z,yv)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Inflow boundary data for the v-component.
      long: |
        Inflow boundary data for the v-component. Only `lod` = *2* allowed. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*.

  inflow_plane_w:
    modules: ["PAC"]
    si-unit: m s^-1^
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow,zw,y)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Inflow boundary data for the w-component.
      long: |
        Inflow boundary data for the w-component.Only `lod` = *2* allowed. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*.

  init_atmosphere_no:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: ppm # no SI-Unit
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of nitrogen monoxide.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of nitrogen monoxide is prescribed, while for `lod` = *2* the 3-dimensional initial volume data of nitrogen monoxide is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_atmosphere_no2:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: ppm # no SI-Unit
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of nitrogen dioxide.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of nitrogen dioxide is prescribed, while for `lod` = *2* the 3-dimensional initial volume data of nitrogen dioxide is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_atmosphere_no3:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: ppm # no SI-Unit
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of nitrate.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of nitrate is prescribed, while for `lod` = *2* the 3-dimensional initial volume data of nitrate is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_atmosphere_o3:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: ppm # no SI-Unit
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of ozone.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of ozone is prescribed, while for `lod` = *2* the 3-dimensional initial volume data of ozone is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_atmosphere_pm10:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: kg m^-3^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of PM10.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of PM10 is prescribed, while for `lod` = *2* the 3-dimensional initial volume data of PM10 is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_atmosphere_pm25:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: kg m^-3^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of PM2.5.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of PM2.5 is prescribed, while for `lod` = *2* the 3-dimensional initial volume data of PM2.5 is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_atmosphere_pt:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: K
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of potential temperature.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of potential temperature is prescribed, while for `lod` = *2* 3-dimensional initial volume data of potential temperature is set.

  init_atmosphere_qv:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: kg kg^-1^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of specific humidity.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of specific humidity is prescribed, while for `lod` = *2* 3-dimensional initial volume data of specific humidity is set.

  init_atmosphere_s:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    si-unit: kg m^-1^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of any passive scalar.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of any passive scalar is prescribed, while for `lod` = *2* 3-dimensional initial volume data of any passive scalar is set.
        Input of this quantity becomes only effective if [passive scalar](../../../Namelists/#initialization_parameters--passive_scalar) = *.T.*

  init_atmosphere_u:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,xu)
    si-unit: m s^-1^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of the wind velocity component in x direction.
      long: |
        In case `lod` = *1*, a one-dimensional initial profile of wind velocity component in x direction is prescribed, while for `lod` = *2* three-dimensional initial volume data of wind velocity component in x direction is set.

  init_atmosphere_v:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,yv,x)
    si-unit: m s^-1^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of the wind velocity component in y direction.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of wind velocity component in y direction is prescribed, while for `lod` = *2* 3-dimensional initial volume data of wind velocity component in y directionis set.

  init_atmosphere_w:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (zw,y,x)
    si-unit: m s^-1^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of the wind velocity component in z direction.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of the wind velocity component in z direction is prescribed, while for `lod` = *2* 3-dimensional initial volume data of the wind velocity component in z direction is set.<br>
        Note that PALM ignores this variable in case of `lod` = *1*. This may change in a future release.

  init_atmosphere_yyy:
    modules: ["CHM"]
    mandatory: false
    type: NC_FLOAT
    shape: (z,y,x)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Initial values of further chemical species.
      long: |
        Replace the `_yyy` in the variable name by the name of the respective chemical species. In case `lod` = *1*, a 1-dimensional initial profile of this species is prescribed, while for `lod` = *2* 3-dimensional initial volume data of this species is set.
        Input of this quantity becomes only effective if [chemistry model](../../../Namelists/#chemistry-parameters) is switched on.

  init_soil_m:
    modules: ["LSM"]
    si-unit: m ^3^ m^-3^
    mandatory: false
    type: NC_FLOAT
    shape: (zsoil,y,x)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default:
      depends_on: "namelist parameter [soil_moisture](../../../Namelists/#land_surface_parameters--soil_moisture)"
    description:
      short: Initial values of soil_moisture.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of soil_moisture is prescribed, while for `lod` = *2* 3-dimensional initial volume data of soil_moisture is set.
        Input of this quantity becomes only effective if [land surface model](../../../Namelists/#land-surface-parameters) is switched on.
        In case of a nested run and no dynamic driver file is present for the child domain, soil temperature in the child domain will be initialized by a horizontally averaged mean vertical soil moisture profile derived from the respective parent domain. 
        Moreover, please note that [zsoil](../static/#static--dimension--zsoil) needs to have the same size as in the [static input](../static/#static) file.

  init_soil_t:
    modules: ["LSM"]
    si-unit: K
    mandatory: false
    type: NC_FLOAT
    shape: (zsoil,y,x)
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default:
      depends_on: "namelist parameter [soil_temperature](../../../Namelists/#land_surface_parameters--soil_temperature)"
    description:
      short: Initial values of soil temperature.
      long: |
        In case `lod` = *1*, a 1-dimensional initial profile of soil temperature is prescribed, while for `lod` = *2* 3-dimensional initial volume data of soil temperature is set.
        Input of this quantity becomes only effective if [land surface model](../../../Namelists/#land-surface-parameters) is switched on.
        In case of a nested run and no dynamic driver file is present for the child domain, soil temperature in the child domain will be initialized by a horizontally averaged mean vertical soil-temperature profile derived from the respective parent domain. 
        Moreover, please note that [zsoil](../static/#static--dimension--zsoil) needs to have the same size as in the [static input](../static/#static) file.

