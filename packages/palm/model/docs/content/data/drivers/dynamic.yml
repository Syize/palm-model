    modules: ["RAD"]
    mandatory: false
    type: NC_FLOAT
    shape: (time_rad)
    si-unit: W m^-2^
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Shortwave downwelling diffuse radiation.
      long: |
        Time series of shortwave downwelling diffuse radiation, which can be optionally input. Becomes only effective if namelist parameter [radiation_scheme](../../../Namelists/#radiation_parameters--radiation_scheme) = *'external'*. In case it is missing, the incoming shortwave radiation will be split into direct and diffuse fractions based on clear-sky assumptions. 
        Only `lod` = *1* is allowed.

