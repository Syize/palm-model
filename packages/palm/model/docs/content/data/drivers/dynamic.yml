  #       Only `lod` = *1* allowed.

  # surface_forcing_qv_surface:
  #   modules: ['PAC']
  #   mandatory: false
  #   type: NC_FLOAT
  #   shape: (time)
  #   si-unit: kg kg^-1^
  #   attributes:
  #     lod:
  #       mandatory: true
  #   default: ~
  #   description:
  #     short: Surface specific humidity forcing.
  #     long: |
  #       Large-scale forcing for the surface specific humidity. Requires [nesting_offl_parameters](../../../Namelists/##offline-nesting-parameters) to be enabled to become effective.
  #       Only `lod` = *1* allowed.

  surface_forcing_surface_pressure:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (time)
    si-unit: Pa
    attributes:
      lod:
        mandatory: true
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Large-scale value for surface pressure.
      long: |
        Requires [nesting_offl_parameters](../../../Namelists/##offline-nesting-parameters) to be enabled to become effective. 
        Only `lod` = *1* is allowed.

  time:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (time)
    si-unit: s
    attributes:
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Time variable of dynamic input data.
      long: |
        See also dimension [time](#dynamic--dimension--time).
        Containes the times for which respective quantities in the dynamic driver file are given. The time values in the dynamic driver file must cover the entire simulation time (last time value >= [end_time](../../../Namelists/#../../../Namelists/runtime_parameters--end_time)).

  time_inflow:
    modules: ["PAC"] # Turbulent Inflow
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow)
    si-unit: s
    attributes:
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Time variable of turbulent inflow data.
      long: |
        Containes the times for which turbulent inflow data is given. Mandatory if [turbulent_inflow_method](../../../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method) = *'read_from_file'*.
        Only `lod` = *1* is allowed.

  time_rad:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (time_inflow)
    si-unit: s
    attributes:
      _FillValue:
        mandatory: true
    default: ~
    description:
      short: Time variable of external radiation data.
      long: |
        Contains the times for which external radiation data is given. Mandatory if namelist parameter [radiation_scheme](../../../Namelists/#radiation_parameters--radiation_scheme) = *'external'*.
        Only `lod` = *1* is allowed.

  x:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (x)
    si-unit: m
    attributes: {}
    default: ~
    description:
      short: Distance along x-axis to the left border of the model domain.
      long: |
        This distance is valid for all quantities except the u-velocity component. See also dimension [x](#dynamic--dimension--x).

  xu:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (xu)
    si-unit: m
    attributes: {}
    default: ~
    description:
      short: Distance along xu-axis to the left border of the model domain.
      long: |
        This distance is valid for the u-velocity component. See also dimension [xu](#dynamic--dimension--xu).

  y:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (y)
    si-unit: m
    attributes: {}
    default: ~
    description:
      short: Distance along y-axis to the south border of the model domain.
      long: |
        This distance is valid for all quantities except the v-velocity component. See also dimension [y](#dynamic--dimension--y).

  yv:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (yv)
    si-unit: m
    attributes: {}
    default: ~
    description:
      short: Distance along yv-axis to the south border of the model domain.
      long: |
        This distance is valid for the v-velocity component. See also dimension [yv](#dynamic--dimension--yv).

  z:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (z)
    si-unit: m
    attributes: {}
    default: ~
    description:
      short: Distance along z-axis to the bottom of the model domain.
      long: |
        The `z`-levels represent the scalar levels. `z` features the half-grid level heights: `zu(k) = (k-0.5 ) * dz`. By definition, `z(0) = 0.0`. The dynamic driver begins at `z(1)`. See also dimension [z](#dynamic--dimension--z).

  zw:
    modules: ["PAC"]
    mandatory: false
    type: NC_FLOAT
    shape: (zw)
    si-unit: m
    attributes: {}
    default: ~
    description:
      short: Distance along zw-axis to the bottom of the model domain.
      long: |
        `zw` features the full-grid level heights `zw(k) = k * dz`. The w-levels lie half between the [z](#dynamic--variable--z)-levels: `zw(k) = ( z(k) + z(k+1) ) * 0.5`, except for `k=0`, where `zw(0) = 0.0`. The dynamic driver starts at `zw(1)`. See also dimension [zw](#dynamic--dimension--zw).

  zsoil:
    modules: ["LSM"]
    mandatory: false
    type: NC_FLOAT
    shape: (zsoil)
    si-unit: m
    attributes: {}
    default:
      depends_on: "namelist parameter [dz_soil](../../../Namelists/#land_surface_parameters--dz_soil)"
    description:
      short: Distance along z from the surface for the respective soil grid point (always positive).
      long: |
        The z-coordinates in m (positive downward) of the soil grid points. Describes the depth of the soil layers. Overwrites the values of the Namelist parameter [dz_soil](../../../Namelists/#land_surface_parameters--dz_soil). The `zsoil`-layer depth can be fully independent on the [static driver](../static/#static) settings [zsoil](../static/#static--variable--zsoil). Values will be interpolated onto the respective levels. See also dimension [zsoil](#dynamic--dimension--zsoil).
