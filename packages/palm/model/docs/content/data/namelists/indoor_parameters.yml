---
# This is the YAML Database file for all allowed parameters within the namelist "indoor_parameters"
#

high_vent_end_industry_building:
  category: Geographical
  type: C*23
  default:
    value: '2019-06-21 22:00:00 +00'
  description:
    short: End date and time of high ventilation load for industry buildings.
    long: |
      The default is set to 21st of June 2019 at 22UTC. Please see also explanations given for [origin_date_time](#initialization_parameters--origin_date_time). The given date should correspond to [origin_date_time](#initialization_parameters--origin_date_time).

high_vent_end_office_building:
  category: Geographical
  type: C*23
  default:
    value: '2019-06-21 18:00:00 +00'
  description:
    short: End date and time of high ventilation load for office buildings.
    long: |
      The default is set to 21st of June 2019 at 22UTC. Please see also explanations given for [origin_date_time](#initialization_parameters--origin_date_time). The given date should correspond to [origin_date_time](#initialization_parameters--origin_date_time).

