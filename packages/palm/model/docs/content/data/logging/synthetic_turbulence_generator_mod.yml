STG0001:
  loglevel: ERROR
  message: |
    synthetic turbulence generator is required if offline nesting is applied and PALM operates in LES mode
  description: |
    In order to trigger turbulence, synthetic turbulence need to be imposed at the lateral boundaries, else very larger adjustment zones in the order of O(10 km) are required.

STG0002:
  loglevel: ERROR
  message: |
    synthetic turbulence generator is required when nesting is applied and parent operates in RANS-mode but current child in LES mode
  description: ''

STG0003:
  loglevel: ERROR
  message: |
    using synthetic turbulence generator not allowed in ... nesting
  description: ''

STG0004:
  loglevel: ERROR
  message: |
    using synthetic turbulence generator requires [initializing_actions](../Namelists/#initialization_parameters--initializing_actions) = *"set_constant_profiles"* or *"read_restart_data"*, if no offline nesting is applied
  description: ''


STG0005:
  loglevel: ERROR
  message: |
    using synthetic turbulence generator requires [bc_lr](../Namelists/#initialization_parameters--bc_lr) = *"dirichlet/radiation"*, if no offline nesting is applied
  description: |
    The synthetic turbulence generator requires a non-cyclic boundary condition along `x` direction with an inflow at the left domain boundary.

STG0006:
  loglevel: ERROR
  message: |
    using synthetic turbulence generator requires [bc_ns](../Namelists/#initialization_parameters--bc_ns) = *"cyclic"*, if no offline nesting is applied
  description: |
    The synthetic turbulence generator only supports non-cyclic boundary conditions at the left/right boundary. In north/south direction, cyclic boundary conditions must be set.

STG0007:
  loglevel: ERROR
  message: |
    input file "..." for synthetic turbulence generator is missing
  description: |
    Using the synthetic turbulence generator in idealized setups (no mesoscale nesting or self nesting), requires a STG_PROFILES file to have proper information about turbulent length and time scales, as well as Reynolds stress components. Please provide the respective turbulence data (derived from a precursor simulation or observations).

STG0008:
  loglevel: ERROR
  message: |
    boundary_layer_depth = ... <= 0.0 or almost approaches the domain top
  description: |
    For using parametrized turbulence (no STG_PROFILES file given) in a neutral simulation, the boundary-layer depth set via [boundary_layer_depth](../Namelists/#stg_par--boundary_layer_depth) must be > *0.0* and < the domain top. More precisely, it must not exceed the height given by `zw(nzt-5)` (5 grid points below the top boundary).

STG0009:
  loglevel: ERROR
  message: |
    using synthetic turbulence generator in combination with turbulent_inflow = .T. is not allowed
  description: |
    A turbulent inflow can only be generated by either the synthetic turbulence generator or the [turbulence recycling method](../Namelists/#turbulent_inflow_parameters--turbulent_inflow_method). Using both at the same time is impossible.

STG0010:
  loglevel: ERROR
  message: |
    using synthetic turbulence generator requires [random_generator](../Namelists/#initialization_parameters--random_generator) = *'random-parallel'*.
  description: ''

STG0011:
  loglevel: ERROR
  message: |
    [compute_velocity_seeds_local](../Namelists/#stg_par--compute_velocity_seeds_local) = *.F.* requires ratios nz / npex and nz / npey to be >= 1
  description: To distribute the computation of velocity seeds among the cores, each core computes velocity seeds for a dedicated range along the vertical direction. However, if the ratio of vertical grid points to the number of cores along the x- or y-direction is less than 1, the algorithm to distribute the workload does not work anymore. In order to avoid this, set [compute_velocity_seeds_local](../Namelists/#stg_par--compute_velocity_seeds_local) = *.T.*, or alternatively, try to change the domain decomposition via the parameters [npex](../Namelists/#initialization_parameters--npex) and [npey](../Namelists/#initialization_parameters--npey) so that the ratios nz / npex and nz / npey are larger than 1.

STG0012:
  loglevel: WARNING
  message: |
    boundary layer depth exceeds the model top
  description: The boundary-layer depth is computed from the mesoscale model input. If this warning is given, the model domain top is below or in the range of the computed boundary-layer depth. In some cases, this can lead to blow-ups of the imposed velocity perturbations. To avoid this, it is recommended to increase the vertical model extent.


STG0013:
  loglevel: ERROR
  message: |
    illegal domain decomposition to be used with the STG
  description: Mesocale nesting, where perturbations are imposed by the STG on all lateral boundaries, does not allow to use a one-dimensional domain decomposition along x or y (see [npex](../Namelists/#initialization_parameters--npex) and [npey](../Namelists/#initialization_parameters--npey)).

STG0014:
  loglevel: ERROR
  message: |
    [disturb_theta](../Namelists/#stg_par--disturb_theta) = *.T.* not allowed for neutral setups
  description: Adding perturbations onto the potential temperature requires [neutral](../Namelists/#initialization_parameters--neutral) = *.F.*.

STG0015:
  loglevel: ERROR
  message: |
    illegal value of [theta_amplitude](../Namelists/#stg_par--theta_amplitude) = ...
  description: Adding perturbations onto the potential temperature (via [disturb_theta](../Namelists/#stg_par--disturb_theta) = *.T.*) requires positive, non-zero values of [theta_amplitude](../Namelists/#stg_par--theta_amplitude).
